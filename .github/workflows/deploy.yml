name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Ensure Pages project exists
        run: npx wrangler pages project create srn --production-branch=main 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            npx wrangler pages deploy dist/ \
              --project-name=srn \
              --branch=main 2>&1 | tee /tmp/wrangler-out.txt
          else
            BRANCH=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c1-28)
            npx wrangler pages deploy dist/ \
              --project-name=srn \
              --branch="$BRANCH" 2>&1 | tee /tmp/wrangler-out.txt
          fi
          URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.pages\.dev' /tmp/wrangler-out.txt | head -n1)
          echo "url=${URL}" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "Pages preview: ${{ steps.deploy.outputs.url }}"
